name: CI (lint, type, tests)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles("**/requirements.txt") }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install project deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff black mypy bandit pytest pytest-cov papermill jupyter nbformat nbconvert

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Black)
        run: black --check .

      - name: Security scan (Bandit)
        run: bandit -r scIDiff -x tests

      - name: Type check (Mypy)
        run: mypy scIDiff || true  # dont fail CI on incomplete typing for now

      - name: Unit tests
        run: |
          pytest -q --disable-warnings --maxfail=1 --cov=scIDiff --cov-report=xml --cov-report=term-missing

      - name: Notebook smoke test (basic usage)
        run: |
          if [ -f notebooks/01_basic_usage.ipynb ]; then
            papermill notebooks/01_basic_usage.ipynb notebooks/01_basic_usage.out.ipynb -k python3 || true
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

