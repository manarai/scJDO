# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Continuous Integration for scqdiff
#
# Triggers:  push to main or any feature branch
#            pull request targeting main
#
# Jobs:
#   lint    — ruff + black (formatting/style, non-blocking on warnings)
#   test    — pytest with coverage across Python 3.9, 3.10, 3.11
#   type    — mypy static type check (informational, non-blocking)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same branch to save compute
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff check
        run: ruff check scqdiff/ tests/

      - name: black check
        run: black --check scqdiff/ tests/

  # ─── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint          # only run tests if linting passes

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip to speed up repeated installs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install CPU-only PyTorch (CI — no GPU)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install scqdiff + dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scqdiff \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage to Codecov
        # Only upload from the primary Python version to avoid duplicate reports
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # coverage upload failure should not break CI

  # ─── Type checking (informational) ─────────────────────────────────────────
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Run in parallel with tests; failure here is a warning, not a blocker
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies + mypy
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
          pip install mypy

      - name: mypy
        run: mypy scqdiff/ --ignore-missing-imports --no-strict-optional
